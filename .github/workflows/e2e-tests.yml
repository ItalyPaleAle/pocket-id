name: E2E Tests
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/**"
  pull_request:
    branches: [main, breaking/**]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/**"

jobs:
  build:
    if: github.event.pull_request.head.ref != 'i18n_crowdin'
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: false
          tags: pocket-id:test
          outputs: type=docker,dest=/tmp/docker-image.tar
          build-args: BUILD_TAGS=e2etest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

  test:
    if: github.event.pull_request.head.ref != 'i18n_crowdin'
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: sqlite
            storage: filesystem
          - db: postgres
            storage: filesystem
          - db: sqlite
            storage: s3
          - db: sqlite
            storage: database
          - db: postgres
            storage: database

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Cache PostgreSQL Docker image
        uses: actions/cache@v4
        id: postgres-cache
        with:
          path: /tmp/postgres-image.tar
          key: postgres-17-${{ runner.os }}
      - name: Pull and save PostgreSQL image
        if: matrix.db == 'postgres' && steps.postgres-cache.outputs.cache-hit != 'true'
        run: |
          docker pull postgres:17
          docker save postgres:17 > /tmp/postgres-image.tar
      - name: Load PostgreSQL image
        if: matrix.db == 'postgres' && steps.postgres-cache.outputs.cache-hit == 'true'
        run: docker load < /tmp/postgres-image.tar

      - name: Cache LLDAP Docker image
        uses: actions/cache@v4
        id: lldap-cache
        with:
          path: /tmp/lldap-image.tar
          key: lldap-stable-${{ runner.os }}
      - name: Pull and save LLDAP image
        if: steps.lldap-cache.outputs.cache-hit != 'true'
        run: |
          docker pull lldap/lldap:2025-05-19
          docker save lldap/lldap:2025-05-19 > /tmp/lldap-image.tar
      - name: Load LLDAP image
        if: steps.lldap-cache.outputs.cache-hit == 'true'
        run: docker load < /tmp/lldap-image.tar

      - name: Cache SCIM Test Server Docker image
        uses: actions/cache@v4
        id: scim-cache
        with:
          path: /tmp/scim-test-server-image.tar
          key: scim-test-server-${{ runner.os }}
      - name: Pull and save SCIM Test Server image
        if: steps.scim-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/pocket-id/scim-test-server
          docker save ghcr.io/pocket-id/scim-test-server > /tmp/scim-test-server-image.tar
      - name: Load SCIM Test Server image
        if: steps.scim-cache.outputs.cache-hit == 'true'
        run: docker load < /tmp/scim-test-server-image.tar

      - name: Cache Localstack S3 Docker image
        if: matrix.storage == 's3'
        uses: actions/cache@v4
        id: s3-cache
        with:
          path: /tmp/localstack-s3-image.tar
          key: localstack-s3-latest-${{ runner.os }}
      - name: Pull and save Localstack S3 image
        if: matrix.storage == 's3' && steps.s3-cache.outputs.cache-hit != 'true'
        run: |
          docker pull localstack/localstack:s3-latest
          docker save localstack/localstack:s3-latest > /tmp/localstack-s3-image.tar
      - name: Load Localstack S3 image
        if: matrix.storage == 's3' && steps.s3-cache.outputs.cache-hit == 'true'
        run: docker load < /tmp/localstack-s3-image.tar

      - name: Cache AWS CLI Docker image
        if: matrix.storage == 's3'
        uses: actions/cache@v4
        id: aws-cli-cache
        with:
          path: /tmp/aws-cli-image.tar
          key: aws-cli-latest-${{ runner.os }}
      - name: Pull and save AWS CLI image
        if: matrix.storage == 's3' && steps.aws-cli-cache.outputs.cache-hit != 'true'
        run: |
          docker pull amazon/aws-cli:latest
          docker save amazon/aws-cli:latest > /tmp/aws-cli-image.tar
      - name: Load AWS CLI image
        if: matrix.storage == 's3' && steps.aws-cli-cache.outputs.cache-hit == 'true'
        run: docker load < /tmp/aws-cli-image.tar

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Install test dependencies
        run: pnpm --filter pocket-id-tests install --frozen-lockfile

      - name: Install Playwright Browsers
        working-directory: ./tests
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Docker containers
        working-directory: ./tests/setup
        run: |
          DOCKER_COMPOSE_FILE=docker-compose.yml

          cat > .env <<EOF
          FILE_BACKEND=${{ matrix.storage }}
          SCIM_SERVICE_PROVIDER_URL=http://localhost:18123/v2
          SCIM_SERVICE_PROVIDER_URL_INTERNAL=http://scim-test-server:8080/v2
          EOF

          if [ "${{ matrix.db }}" = "postgres" ]; then
            DOCKER_COMPOSE_FILE=docker-compose-postgres.yml
          elif [ "${{ matrix.storage }}" = "s3" ]; then
            DOCKER_COMPOSE_FILE=docker-compose-s3.yml
          fi

          docker compose -f "$DOCKER_COMPOSE_FILE" up -d

          {
            LOG_FILE="/tmp/backend.log"
            while true; do
              CID=$(docker compose -f "$DOCKER_COMPOSE_FILE" ps -q pocket-id)
              if [ -n "$CID" ]; then
                echo "[$(date)] Attaching logs for $CID" >> "$LOG_FILE"
                docker logs -f --since=0 "$CID" >> "$LOG_FILE" 2>&1
              else
                echo "[$(date)] Container not yet running…" >> "$LOG_FILE"
              fi
              sleep 1
            done
          } &

      - name: Run Playwright tests
        working-directory: ./tests
        run: pnpm exec playwright test

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always() && github.event.pull_request.head.ref != 'i18n_crowdin'
        with:
          name: playwright-report-${{ matrix.db }}-${{ matrix.storage }}
          path: tests/.report
          include-hidden-files: true
          retention-days: 15

      - name: Upload Backend Test Report
        uses: actions/upload-artifact@v4
        if: always() && github.event.pull_request.head.ref != 'i18n_crowdin'
        with:
          name: backend-${{ matrix.db }}-${{ matrix.storage }}
          path: /tmp/backend.log
          include-hidden-files: true
          retention-days: 15

  sqlite-network-filesystem-warning:
    if: github.event.pull_request.head.ref != 'i18n_crowdin'
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - name: Install Podman and NFS packages
        run: |
          sudo apt-get update
          sudo apt-get install -y podman nfs-kernel-server nfs-common rpcbind

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image into Podman
        run: podman load -i /tmp/docker-image.tar

      - name: Run Pocket ID with SQLite on an NFS mount
        run: |
          set -euo pipefail

          EXPORT_DIR=/tmp/pocket-id-nfs-export
          MOUNT_DIR=/tmp/pocket-id-nfs-mount
          LOG_FILE=/tmp/pocket-id-nfs.log
          LOG_PID=""
          LOG_READY_TIMEOUT=30
          WARNING_TEXT="⚠️⚠️⚠️ SQLite databases should not be stored on a networked file system like NFS, SMB, or FUSE"
          WARNING_TIMEOUT=120
          container_running() {
            [ "$(podman inspect -f '{{.State.Running}}' pocket-id-nfs-test 2>/dev/null || echo false)" = "true" ]
          }

          cleanup() {
            case "$LOG_PID" in
              ''|*[!0-9]*) ;;
              *) if [ "$LOG_PID" -gt 0 ]; then
                   kill "$LOG_PID" 2>/dev/null || true
                 fi ;;
            esac
            podman rm -f pocket-id-nfs-test >/dev/null 2>&1 || true
            sudo systemctl stop nfs-kernel-server >/dev/null 2>&1 || sudo service nfs-kernel-server stop >/dev/null 2>&1 || true
            sudo systemctl stop rpcbind >/dev/null 2>&1 || sudo service rpcbind stop >/dev/null 2>&1 || true
            if mountpoint -q "$MOUNT_DIR"; then
              sudo umount -l "$MOUNT_DIR" || true
            fi
            sudo rm -f /etc/exports.d/pocket-id.exports
          }
          trap cleanup EXIT

          rm -f "$LOG_FILE"
          mkdir -p "$EXPORT_DIR" "$MOUNT_DIR"
          chmod 0777 "$EXPORT_DIR"

          printf '%s\n' "$EXPORT_DIR 127.0.0.1(rw,sync,no_subtree_check,insecure,no_root_squash)" | sudo tee /etc/exports.d/pocket-id.exports
          sudo exportfs -rav
          sudo systemctl restart rpcbind || sudo service rpcbind restart
          sudo systemctl restart nfs-kernel-server || sudo service nfs-kernel-server restart

          sudo mount -t nfs -o vers=3,nolock,tcp 127.0.0.1:"$EXPORT_DIR" "$MOUNT_DIR"
          sudo chown "$(id -u):$(id -g)" "$MOUNT_DIR"

          podman run -d \
            --name pocket-id-nfs-test \
            -p 1411:1411 \
            -e APP_ENV=test \
            -e ENCRYPTION_KEY=test-encryption-key \
            -e DB_CONNECTION_STRING=/app/data/pocket-id.db \
            -e PUID="$(id -u)" \
            -e PGID="$(id -g)" \
            -v "$MOUNT_DIR:/app/data" \
            pocket-id:test

          podman logs -f pocket-id-nfs-test 2>&1 | tee "$LOG_FILE" &
          LOG_PID=$!

          for _ in $(seq 1 "$LOG_READY_TIMEOUT"); do
            if [ -f "$LOG_FILE" ]; then
              break
            fi
            if ! container_running; then
              echo "::error::Pocket ID container exited before log capture was ready"
              podman logs pocket-id-nfs-test || true
              exit 1
            fi
            if ! kill -0 "$LOG_PID" 2>/dev/null; then
              echo "::error::Failed to capture Pocket ID container logs"
              break
            fi
            sleep 1
          done

          DEADLINE=$((SECONDS + WARNING_TIMEOUT))
          while true; do
            if [ -f "$LOG_FILE" ] && grep -Fq "$WARNING_TEXT" "$LOG_FILE"; then
              break
            fi
            if ! container_running; then
              echo "::error::Pocket ID container exited before emitting the expected warning"
              podman logs pocket-id-nfs-test || true
              exit 1
            fi
            if ! kill -0 "$LOG_PID" 2>/dev/null; then
              echo "::error::Container log streaming stopped before the expected warning was emitted"
              exit 1
            fi
            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              echo "::error::Expected SQLite network filesystem warning was not found in container logs"
              exit 1
            fi
            sleep 1
          done

      - name: Upload NFS warning logs
        uses: actions/upload-artifact@v4
        if: always() && github.event.pull_request.head.ref != 'i18n_crowdin'
        with:
          name: backend-sqlite-nfs-warning
          path: /tmp/pocket-id-nfs.log
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 15
